<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>คู่มือการพยาบาลผู้ป่วยบาดเจ็บใบหน้า</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Noto+Serif+Thai:wght@400;500;600;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #1a2744;
  --navy-light: #243560;
  --teal: #2a7f7f;
  --teal-light: #3aa8a8;
  --cream: #fdf6e3;
  --cream-dark: #f0e6c8;
  --gold: #c9a227;
  --gold-light: #e8c44a;
  --text-dark: #1a1a2e;
  --text-mid: #3d4a6b;
  --text-light: #7a8bb0;
  --red: #c0392b;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; }

body {
  font-family: 'Sarabun', sans-serif;
  background: #2c1810;
  background-image:
    radial-gradient(ellipse at 20% 50%, #3d2415 0%, transparent 50%),
    radial-gradient(ellipse at 80% 20%, #1a0f08 0%, transparent 50%);
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
}

/* ===== BOOK WRAPPER ===== */
.book-wrap {
  position: relative;
  width: min(520px, 96vw);
  height: min(700px, 92vh);
}

/* Drop shadow under book */
.book-wrap::after {
  content: '';
  position: absolute;
  bottom: -20px;
  left: 5%; right: 5%;
  height: 30px;
  background: rgba(0,0,0,0.6);
  border-radius: 50%;
  filter: blur(18px);
  z-index: -1;
}

/* ===== BOOK SPINE (left decorative strip) ===== */
.book-spine {
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 22px;
  background: linear-gradient(180deg, #0e1c38 0%, #1a2744 40%, #0e1c38 100%);
  border-radius: 4px 0 0 4px;
  box-shadow: inset -3px 0 8px rgba(0,0,0,0.4), 2px 0 6px rgba(0,0,0,0.3);
  z-index: 10;
  display: flex;
  align-items: center;
  justify-content: center;
}

.spine-text {
  writing-mode: vertical-rl;
  transform: rotate(180deg);
  font-family: 'Noto Serif Thai', serif;
  font-size: 9px;
  font-weight: 600;
  color: rgba(201,162,39,0.5);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  white-space: nowrap;
}

/* Spine gold accent lines */
.book-spine::before,
.book-spine::after {
  content: '';
  position: absolute;
  left: 3px; right: 3px;
  height: 1px;
  background: rgba(201,162,39,0.3);
}
.book-spine::before { top: 20px; }
.book-spine::after  { bottom: 20px; }

/* ===== PAGE STAGE ===== */
.page-stage {
  position: absolute;
  left: 22px; right: 0; top: 0; bottom: 0;
  perspective: 1800px;
  border-radius: 0 6px 6px 0;
  overflow: hidden;
  box-shadow: 4px 0 40px rgba(0,0,0,0.5), 0 0 0 1px rgba(0,0,0,0.3);
}

/* ===== PAGE ===== */
.page {
  position: absolute;
  inset: 0;
  background: var(--cream);
  overflow: hidden;
  transform-origin: left center;
  backface-visibility: hidden;
}

/* Paper texture lines */
.page::before {
  content: '';
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    transparent, transparent 28px,
    rgba(180,150,80,0.055) 28px, rgba(180,150,80,0.055) 29px
  );
  pointer-events: none;
  z-index: 0;
}

/* Left gutter shadow (binding effect) */
.page::after {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 28px; height: 100%;
  background: linear-gradient(to right, rgba(0,0,0,0.10), transparent);
  pointer-events: none;
  z-index: 1;
}

/* Incoming page hidden behind */
.page.behind {
  z-index: 1;
}
.page.front {
  z-index: 2;
}

/* ===== FLIP ANIMATIONS ===== */

/* Forward: current page flips right→left (away from reader) */
@keyframes flipAway {
  0%   { transform: perspective(1800px) rotateY(0deg);    opacity: 1; }
  40%  { transform: perspective(1800px) rotateY(-50deg);  opacity: 0.85; box-shadow: -12px 0 30px rgba(0,0,0,0.25); }
  100% { transform: perspective(1800px) rotateY(-110deg); opacity: 0; }
}

/* Forward: new page reveals from right */
@keyframes revealIn {
  0%   { transform: perspective(1800px) rotateY(15deg);  opacity: 0.4; }
  100% { transform: perspective(1800px) rotateY(0deg);   opacity: 1; }
}

/* Backward: current page swings back */
@keyframes flipBack {
  0%   { transform: perspective(1800px) rotateY(0deg);    opacity: 1; }
  100% { transform: perspective(1800px) rotateY(15deg);   opacity: 0; }
}

/* Backward: prev page returns from left */
@keyframes returnIn {
  0%   { transform: perspective(1800px) rotateY(-110deg); opacity: 0; }
  60%  { transform: perspective(1800px) rotateY(-20deg);  opacity: 0.85; }
  100% { transform: perspective(1800px) rotateY(0deg);    opacity: 1; }
}

.page.anim-away   { animation: flipAway  0.45s cubic-bezier(0.4,0,0.6,1) forwards; z-index: 5; }
.page.anim-in     { animation: revealIn  0.45s cubic-bezier(0.4,0,0.6,1) forwards; z-index: 4; }
.page.anim-back   { animation: flipBack  0.35s ease-in forwards; z-index: 5; }
.page.anim-return { animation: returnIn  0.45s cubic-bezier(0.4,0,0.6,1) forwards; z-index: 4; }

/* ===== PAGE CONTENT SCROLL ===== */
.page-inner {
  position: relative;
  z-index: 2;
  height: 100%;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 32px 28px 72px 30px;
  scroll-behavior: smooth;
}
.page-inner::-webkit-scrollbar { width: 3px; }
.page-inner::-webkit-scrollbar-thumb { background: rgba(201,162,39,0.3); border-radius: 2px; }

/* Page number */
.page-num {
  position: absolute;
  bottom: 14px; right: 18px;
  font-family: 'Noto Serif Thai', serif;
  font-size: 11px;
  color: var(--text-light);
  letter-spacing: 0.08em;
  z-index: 3;
}

/* ===== COVER PAGE ===== */
.cover-bg {
  position: absolute;
  inset: 0;
  background: linear-gradient(155deg, #1a2744 0%, #0e1c38 55%, #0a1628 100%);
  z-index: 2;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 36px 28px;
  text-align: center;
}
.cover-bg::before {
  content: '';
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse at 30% 30%, rgba(42,127,127,0.22) 0%, transparent 55%),
    radial-gradient(ellipse at 75% 70%, rgba(201,162,39,0.13) 0%, transparent 50%);
}
.cover-bg::after {
  content: '';
  position: absolute; inset: 0;
  background-image:
    repeating-linear-gradient(0deg,transparent,transparent 30px,rgba(201,162,39,0.035) 30px,rgba(201,162,39,0.035) 31px),
    repeating-linear-gradient(90deg,transparent,transparent 30px,rgba(201,162,39,0.035) 30px,rgba(201,162,39,0.035) 31px);
}
.cover-emblem {
  width: 68px; height: 68px;
  background: rgba(201,162,39,0.13);
  border: 2px solid rgba(201,162,39,0.35);
  border-radius: 16px;
  display: flex; align-items: center; justify-content: center;
  font-size: 32px;
  margin-bottom: 20px;
  box-shadow: 0 0 32px rgba(201,162,39,0.18);
  position: relative; z-index: 1;
}
.cover-label {
  font-size: 9px; font-weight: 700;
  letter-spacing: 0.2em; text-transform: uppercase;
  color: var(--gold-light); opacity: 0.72;
  margin-bottom: 14px; position: relative; z-index: 1;
}
.cover-title {
  font-family: 'Noto Serif Thai', serif;
  font-size: clamp(20px, 5vw, 30px);
  font-weight: 900; color: var(--cream);
  line-height: 1.35; margin-bottom: 10px;
  position: relative; z-index: 1;
}
.cover-title span { color: var(--gold-light); }
.cover-subtitle {
  font-size: clamp(11px, 2.5vw, 13px);
  color: rgba(253,246,227,0.58);
  line-height: 1.75; max-width: 300px;
  position: relative; z-index: 1; margin-bottom: 24px;
}
.cover-hr {
  width: 56px; height: 2px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  margin: 0 auto 20px; position: relative; z-index: 1;
}
.cover-tags {
  display: flex; flex-wrap: wrap; gap: 6px;
  justify-content: center; position: relative; z-index: 1;
}
.cover-tag {
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.13);
  color: rgba(253,246,227,0.68);
  font-size: 10px; padding: 4px 10px; border-radius: 12px;
}
.cover-hint {
  position: absolute; bottom: 18px;
  font-size: 10px; color: rgba(253,246,227,0.28);
  letter-spacing: 0.05em;
  animation: pulse 2s infinite; z-index: 1;
}
@keyframes pulse { 0%,100%{opacity:0.28} 50%{opacity:0.6} }

/* ===== SECTION BAND ===== */
.sec-band {
  background: linear-gradient(135deg, var(--navy) 0%, var(--navy-light) 100%);
  margin: -32px -28px 18px -30px;
  padding: 22px 24px 18px 26px;
  position: relative; overflow: hidden;
}
.sec-band::after {
  content: '';
  position: absolute; bottom: 0; left: 0; right: 0;
  height: 2.5px;
  background: linear-gradient(90deg, var(--gold), var(--teal-light), transparent);
}
.sec-big {
  font-family: 'Noto Serif Thai', serif;
  font-size: 46px; font-weight: 900;
  color: rgba(201,162,39,0.16);
  position: absolute; top: 4px; right: 14px; line-height: 1;
}
.sec-badge {
  display: inline-block;
  background: rgba(201,162,39,0.14);
  border: 1px solid rgba(201,162,39,0.28);
  color: var(--gold-light);
  font-size: 8.5px; font-weight: 700;
  letter-spacing: 0.1em; text-transform: uppercase;
  padding: 2px 8px; border-radius: 9px; margin-bottom: 6px;
}
.sec-title {
  font-family: 'Noto Serif Thai', serif;
  font-size: clamp(15px, 3.5vw, 20px);
  font-weight: 700; color: var(--cream); line-height: 1.35;
}

/* ===== TYPOGRAPHY ===== */
.ch-sub {
  font-size: 10px; font-weight: 600;
  letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--teal); margin-bottom: 10px;
}
.divider {
  width: 38px; height: 2.5px;
  background: linear-gradient(90deg, var(--gold), var(--teal));
  border-radius: 2px; margin: 8px 0 14px;
}
.body-text {
  font-size: clamp(12px, 2.5vw, 14px);
  color: var(--text-mid); line-height: 1.85; margin-bottom: 10px;
}

/* ===== BLOCKS ===== */
.info-block {
  background: rgba(42,127,127,0.08);
  border-left: 3px solid var(--teal);
  border-radius: 0 7px 7px 0;
  padding: 10px 14px; margin: 10px 0;
  font-size: clamp(11px, 2.3vw, 13px);
  color: var(--text-mid); line-height: 1.8;
}
.warn-block {
  background: rgba(192,57,43,0.07);
  border-left: 3px solid var(--red);
  border-radius: 0 7px 7px 0;
  padding: 10px 14px; margin: 10px 0;
  font-size: clamp(11px, 2.3vw, 13px);
  color: var(--text-mid); line-height: 1.8;
}
.gold-block {
  background: rgba(201,162,39,0.09);
  border-left: 3px solid var(--gold);
  border-radius: 0 7px 7px 0;
  padding: 10px 14px; margin: 10px 0;
  font-size: clamp(11px, 2.3vw, 13px);
  color: var(--text-mid); line-height: 1.8;
}
.bullet-list { list-style: none; padding: 0; margin: 6px 0; }
.bullet-list li {
  font-size: clamp(12px, 2.4vw, 13.5px);
  color: var(--text-mid);
  padding: 3px 0 3px 16px; position: relative; line-height: 1.78;
}
.bullet-list li::before {
  content: '▸'; position: absolute; left: 0;
  color: var(--teal); font-size: 9px; top: 5px;
}
.step-row {
  display: flex; gap: 10px;
  padding: 9px 0;
  border-bottom: 1px solid rgba(180,150,80,0.12);
}
.step-row:last-child { border-bottom: none; }
.step-dot {
  width: 22px; height: 22px;
  background: var(--navy); border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 700; color: var(--gold-light);
  flex-shrink: 0; margin-top: 1px;
}
.step-title { font-weight: 600; color: var(--navy); font-size: clamp(11.5px, 2.4vw, 13px); }
.step-desc { font-size: clamp(11px, 2.2vw, 12.5px); color: var(--text-mid); line-height: 1.72; margin-top: 2px; }

.mini-table {
  width: 100%; border-collapse: collapse; margin: 10px 0;
  font-size: clamp(10px, 2vw, 12px);
}
.mini-table th {
  background: var(--navy); color: var(--cream);
  padding: 7px 9px; text-align: left; font-weight: 600;
}
.mini-table td {
  padding: 6px 9px;
  border-bottom: 1px solid rgba(180,150,80,0.14);
  color: var(--text-mid); line-height: 1.6;
}
.mini-table tr:nth-child(even) td { background: rgba(42,127,127,0.04); }
.mini-table tr:last-child td { border-bottom: none; }
.badge-sm {
  display: inline-block; padding: 1px 7px;
  border-radius: 8px; font-size: 9px; font-weight: 700;
}
.badge-sm.red  { background: rgba(192,57,43,0.12); color: var(--red); }
.badge-sm.gold { background: rgba(201,162,39,0.15); color: #8a6500; }
.badge-sm.teal { background: rgba(42,127,127,0.12); color: var(--teal); }

.check-row {
  display: flex; align-items: flex-start; gap: 9px;
  padding: 7px 0;
  border-bottom: 1px solid rgba(180,150,80,0.1);
  cursor: pointer;
}
.check-row:last-child { border-bottom: none; }
.check-box {
  width: 17px; height: 17px;
  border: 1.5px solid var(--teal); border-radius: 4px;
  flex-shrink: 0; margin-top: 2px;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; color: white; transition: background 0.2s;
}
.check-row.done .check-box { background: var(--teal); }
.check-label { font-size: clamp(11px, 2.3vw, 12.5px); color: var(--text-mid); line-height: 1.72; }
.check-label strong { color: var(--navy); }

/* ===== IMAGE SLOT ===== */
.img-slot {
  background: linear-gradient(135deg, #ece7d6, #e2dbc8);
  border: 1.5px dashed rgba(201,162,39,0.4);
  border-radius: 9px;
  margin: 14px 0;
  overflow: hidden;
  position: relative;
}

.img-slot-top {
  padding: 16px 14px 10px;
  text-align: center;
}
.img-slot-top .ph-icon { font-size: 26px; opacity: 0.4; display: block; margin-bottom: 4px; }
.img-slot-top .ph-label { font-size: 11px; font-weight: 600; color: var(--text-mid); display: block; margin-bottom: 2px; }
.img-slot-top .ph-hint  { font-size: 10px; color: var(--text-light); }

/* Displayed image */
.img-slot-preview {
  display: none;
  padding: 10px 10px 4px;
  text-align: center;
}
.img-slot-preview img {
  max-width: 100%; max-height: 160px;
  border-radius: 7px; object-fit: contain;
  display: block; margin: 0 auto;
}
.img-slot-preview .img-caption {
  font-size: 10px; color: var(--text-light); margin-top: 4px;
}

/* ===== MENU PAGE ===== */
.menu-wrap {
  padding: 28px 24px;
  height: 100%;
  display: flex; flex-direction: column;
}
.menu-head {
  text-align: center;
  padding-bottom: 14px;
  margin-bottom: 14px;
  border-bottom: 1px solid rgba(180,150,80,0.22);
}
.menu-head .ico { font-size: 24px; margin-bottom: 5px; }
.menu-head .ttl {
  font-family: 'Noto Serif Thai', serif;
  font-size: clamp(14px, 3.5vw, 18px);
  font-weight: 700; color: var(--navy);
}
.menu-head .sub {
  font-size: 10px; letter-spacing: 0.08em;
  text-transform: uppercase; color: var(--teal); margin-top: 2px;
}
.toc-list { flex: 1; display: flex; flex-direction: column; gap: 5px; overflow-y: auto; }
.toc-item {
  display: flex; align-items: center; gap: 11px;
  padding: 9px 12px; border-radius: 8px; cursor: pointer;
  transition: all 0.18s; border: 1px solid transparent;
}
.toc-item:hover {
  background: rgba(42,127,127,0.07);
  border-color: rgba(42,127,127,0.18);
}
.toc-num {
  width: 30px; height: 30px;
  background: var(--navy); border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Noto Serif Thai', serif;
  font-size: 11px; font-weight: 700; color: var(--gold-light);
  flex-shrink: 0;
}
.toc-text { flex: 1; }
.toc-name { font-weight: 600; font-size: clamp(11.5px, 2.5vw, 13px); color: var(--navy); line-height: 1.3; }
.toc-desc { font-size: clamp(10px, 2vw, 11px); color: var(--text-light); margin-top: 1px; }

/* ===== BACK COVER ===== */
.back-bg {
  position: absolute; inset: 0; z-index: 2;
  background: linear-gradient(155deg, #1a2744 0%, #0a1420 100%);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 36px 28px; text-align: center;
}
.back-bg::before {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at 50% 45%, rgba(42,127,127,0.18) 0%, transparent 60%);
}
.back-bg::after {
  content: '';
  position: absolute; inset: 0;
  background: repeating-linear-gradient(
    45deg, transparent, transparent 18px,
    rgba(201,162,39,0.03) 18px, rgba(201,162,39,0.03) 19px
  );
}

/* ===== NAV BAR ===== */
.nav-bar {
  position: fixed;
  bottom: 22px; left: 50%;
  transform: translateX(-50%);
  display: flex; align-items: center; gap: 8px;
  background: rgba(12,18,36,0.93);
  backdrop-filter: blur(14px);
  border: 1px solid rgba(201,162,39,0.28);
  border-radius: 50px;
  padding: 7px 14px;
  z-index: 1000;
  box-shadow: 0 8px 36px rgba(0,0,0,0.55);
}
.nav-btn {
  width: 38px; height: 38px; border-radius: 50%;
  border: 1.5px solid rgba(201,162,39,0.3);
  background: rgba(255,255,255,0.05);
  color: var(--cream); font-size: 16px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
}
.nav-btn:hover:not(:disabled) {
  background: rgba(201,162,39,0.2);
  border-color: var(--gold-light);
  transform: scale(1.06);
}
.nav-btn:disabled { opacity: 0.2; cursor: not-allowed; }
.nav-btn.menu-btn {
  background: rgba(201,162,39,0.14); border-color: var(--gold); font-size: 14px;
}
.nav-btn.menu-btn:hover { background: rgba(201,162,39,0.28); }
.nav-info {
  font-family: 'Noto Serif Thai', serif;
  font-size: 11px; color: rgba(253,246,227,0.55);
  min-width: 62px; text-align: center; letter-spacing: 0.04em;
}

/* ===== RESPONSIVE ===== */
@media (max-width: 560px) {
  .book-wrap { width: 99vw; height: 90vh; }
  .book-spine { width: 14px; }
  .spine-text { font-size: 7px; }
  .page-stage { left: 14px; }
  .page-inner { padding: 22px 18px 64px 18px; }
  .sec-band { margin: -22px -18px 14px -18px; padding: 18px 16px 14px; }
}
</style>
</head>
<body>

<div class="book-wrap">
  <!-- Spine -->
  <div class="book-spine">
    <span class="spine-text">Facial Trauma · Nursing Care</span>
  </div>

  <!-- Page stage -->
  <div class="page-stage" id="stage">
    <!-- Pages rendered by JS -->
    <div class="page front" id="pageA"></div>
    <div class="page behind" id="pageB"></div>
  </div>
</div>

<!-- Navigation -->
<div class="nav-bar">
  <button class="nav-btn" id="btnPrev" onclick="prevPage()" title="หน้าก่อนหน้า">&#8592;</button>
  <button class="nav-btn menu-btn" onclick="goMenu()" title="สารบัญ">&#9776;</button>
  <span class="nav-info" id="navInfo">ปก</span>
  <button class="nav-btn" id="btnNext" onclick="nextPage()" title="หน้าถัดไป">&#8594;</button>
</div>

<script>
// ══════════════════════════════════════════════════════
//  ใส่ URL รูปภาพของแต่ละหน้าที่นี่
//  วางลิงก์รูปตรงๆ แล้ว Save → อัปโหลดขึ้น GitHub ใหม่
//  ทุกคนที่เปิดไฟล์นี้จะเห็นรูปเหมือนกันทันที
// ══════════════════════════════════════════════════════
const IMAGE_URLS = {

function imgSlot(key, label) {
  const url = IMAGE_URLS[key] || '';
  if (url) {
    // มีรูป → แสดงรูปเลย
    return `
<div class="img-slot" id="slot-${key}" style="background:transparent;border:none;padding:8px 0;">
  <img src="${url}" alt="${label}"
    style="max-width:100%;max-height:220px;border-radius:9px;object-fit:contain;display:block;margin:0 auto;box-shadow:0 4px 16px rgba(0,0,0,0.12);"
    onerror="this.closest('.img-slot').style.display='none'">
  <div style="text-align:center;font-size:10px;color:var(--text-light);margin-top:5px;">${label}</div>
</div>`;
  } else {
    // ยังไม่มีรูป → แสดงกล่องว่างสวยงาม
    return `
<div class="img-slot" id="slot-${key}">
  <div class="img-slot-top">
    <span class="ph-icon">🖼️</span>
    <span class="ph-label">${label}</span>
    <span class="ph-hint">ยังไม่ได้ใส่รูป — เปิดไฟล์ HTML แล้วใส่ URL ในส่วน IMAGE_URLS</span>
  </div>
</div>`;
  }
}

// ─────────────────────────────────────────────
// BOOK ENGINE
// ─────────────────────────────────────────────
let cur = 0;
let busy = false;
let pages;

const LABELS = ['ปก','สารบัญ','1','2','3','4','5','6','7','8','ปิดท้าย'];

function renderPage(idx, el) {
  el.innerHTML = pages[idx]();
  // Re-attach check toggle (inline onclick already handles it)
}

function updateNav() {
  document.getElementById('btnPrev').disabled = cur === 0;
  document.getElementById('btnNext').disabled = cur === pages.length - 1;
  const lbl = LABELS[cur] !== undefined ? LABELS[cur] : `${cur}`;
  document.getElementById('navInfo').textContent =
    cur === 0 ? 'ปก' : cur === pages.length - 1 ? 'ปิดท้าย' : `หน้า ${lbl}`;
}

const A = document.getElementById('pageA');
const B = document.getElementById('pageB');
let front = A, behind = B;

function init() {
  pages = getPages();
  renderPage(0, front);
  front.className = 'page front';
  behind.className = 'page behind';
  updateNav();
}

function turnForward() {
  if (busy || cur >= pages.length - 1) return;
  busy = true;
  cur++;
  // Render new content on behind page
  renderPage(cur, behind);
  behind.className = 'page anim-in';
  front.className  = 'page anim-away';
  setTimeout(() => {
    front.className  = 'page behind';
    behind.className = 'page front';
    // swap references
    const tmp = front; front = behind; behind = tmp;
    updateNav();
    busy = false;
  }, 460);
}

function turnBackward() {
  if (busy || cur <= 0) return;
  busy = true;
  cur--;
  renderPage(cur, behind);
  behind.className = 'page anim-return';
  front.className  = 'page anim-back';
  setTimeout(() => {
    front.className  = 'page behind';
    behind.className = 'page front';
    const tmp = front; front = behind; behind = tmp;
    updateNav();
    busy = false;
  }, 460);
}

function nextPage() { turnForward(); }
function prevPage() { turnBackward(); }

function jumpTo(pg) {
  if (pg === cur || busy) return;
  const dir = pg > cur ? 1 : -1;
  cur = pg;
  renderPage(cur, behind);
  if (dir > 0) {
    behind.className = 'page anim-in';
    front.className  = 'page anim-away';
  } else {
    behind.className = 'page anim-return';
    front.className  = 'page anim-back';
  }
  busy = true;
  setTimeout(() => {
    front.className  = 'page behind';
    behind.className = 'page front';
    const tmp = front; front = behind; behind = tmp;
    updateNav();
    busy = false;
  }, 460);
}

function goMenu() { jumpTo(1); }

// Keyboard
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') nextPage();
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   prevPage();
});

// Touch swipe
let tx = 0;
document.addEventListener('touchstart', e => { tx = e.touches[0].clientX; }, {passive:true});
document.addEventListener('touchend',   e => {
  const dx = e.changedTouches[0].clientX - tx;
  if (Math.abs(dx) > 50) { dx < 0 ? nextPage() : prevPage(); }
}, {passive:true});

// Init
init();
</script>
